<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vishal Sales - Product Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary-blue: #00bfff;
      --secondary-blue: #0066cc;
      --dark-bg: #0b0c1e;
      --card-bg: #1b1c33;
      --card-bg-hover: #20224a;
      --accent-gold: #ffcc00;
      --success-green: #00ff99;
      --text-light: #ddd;
      --sidebar-bg: rgba(13, 27, 42, 0.95);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, var(--dark-bg), #1a1a2e, #16213e);
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--dark-bg);
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(45deg, var(--primary-blue), var(--secondary-blue));
      border-radius: 10px;
    }

    /* Header Section */
    .header-section {
      background: linear-gradient(135deg, var(--sidebar-bg), rgba(27, 28, 51, 0.8));
      backdrop-filter: blur(10px);
      padding: 20px 0;
      margin-bottom: 30px;
      border-bottom: 2px solid rgba(0, 191, 255, 0.2);
    }

    .breadcrumb-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      color: var(--text-light);
      margin-bottom: 20px;
    }

    .breadcrumb-nav a {
      color: var(--primary-blue);
      text-decoration: none;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .breadcrumb-nav a:hover {
      color: #ffffff;
      text-shadow: 0 0 10px var(--primary-blue);
    }

    .page-title {
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(45deg, var(--primary-blue), #ffffff);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    /* Back Button */
    .btn-back {
      background: linear-gradient(45deg, #6c757d, #495057);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      font-weight: bold;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 30px;
    }

    .btn-back:hover {
      background: linear-gradient(45deg, #495057, #343a40);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      color: white;
    }

    /* Main Product Card */
    .product-card {
      background: linear-gradient(145deg, var(--card-bg), var(--card-bg-hover));
      border: 1px solid rgba(0, 191, 255, 0.2);
      border-radius: 25px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.8s ease-out;
    }

    .product-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(0, 191, 255, 0.05), transparent 70%);
      pointer-events: none;
    }

    /* Product Image Section */
    .product-image-section {
      background: linear-gradient(135deg, #ffffff, #f8f9fa);
      border-radius: 20px;
      padding: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 500px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .product-image-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, rgba(0, 191, 255, 0.05), transparent 50%);
      pointer-events: none;
    }

    .product-image {
      max-width: 100%;
      max-height: 450px;
      object-fit: contain;
      border-radius: 15px;
      transition: transform 0.3s ease;
      z-index: 2;
      position: relative;
    }

    .product-image:hover {
      transform: scale(1.05);
    }

    /* Product Details Section */
    .product-details {
      padding-left: 30px;
    }

    .product-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary-blue);
      margin-bottom: 20px;
      line-height: 1.3;
    }

    .product-brand {
      background: rgba(0, 191, 255, 0.1);
      color: var(--primary-blue);
      padding: 8px 16px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      margin-bottom: 25px;
      border: 1px solid rgba(0, 191, 255, 0.3);
    }

    /* Pricing Section */
    .pricing-section {
      background: linear-gradient(135deg, rgba(0, 255, 153, 0.1), rgba(0, 191, 255, 0.1));
      padding: 25px;
      border-radius: 20px;
      margin-bottom: 25px;
      border: 1px solid rgba(0, 255, 153, 0.3);
    }

    .discounted-price {
      color: var(--success-green);
      font-size: 2.2rem;
      font-weight: bold;
      margin-right: 15px;
    }

    .original-price {
      color: #888;
      text-decoration: line-through;
      font-size: 1.5rem;
      margin-right: 15px;
    }

    .discount-badge {
      background: linear-gradient(45deg, #ff4d4d, #ff1a1a);
      color: white;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: bold;
      display: inline-block;
      animation: pulse 2s infinite;
    }

    /* Rating Section */
    .rating-section {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 30px;
      padding: 15px;
      background: rgba(255, 204, 0, 0.1);
      border-radius: 15px;
      border: 1px solid rgba(255, 204, 0, 0.3);
    }

    .rating-stars {
      color: var(--accent-gold);
      font-size: 1.5rem;
    }

    .rating-value {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--accent-gold);
    }

    .rating-label {
      color: var(--text-light);
      font-size: 0.9rem;
    }

    /* Section Headers */
    .section-header {
      color: var(--primary-blue);
      font-size: 1.5rem;
      font-weight: bold;
      margin: 30px 0 20px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .section-header::before {
      content: '';
      width: 4px;
      height: 25px;
      background: linear-gradient(45deg, var(--primary-blue), var(--secondary-blue));
      border-radius: 2px;
    }

    /* Offers Section */
    .offers-section {
      background: linear-gradient(135deg, rgba(0, 255, 153, 0.05), rgba(0, 191, 255, 0.05));
      padding: 25px;
      border-radius: 20px;
      margin-bottom: 30px;
      border: 1px solid rgba(0, 255, 153, 0.2);
    }

    .offer-item {
      background: rgba(0, 255, 153, 0.1);
      padding: 12px 18px;
      border-radius: 12px;
      margin-bottom: 12px;
      border-left: 4px solid var(--success-green);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .offer-item:hover {
      background: rgba(0, 255, 153, 0.15);
      transform: translateX(5px);
    }

    .offer-item:last-child {
      margin-bottom: 0;
    }

    .offer-icon {
      color: var(--success-green);
      font-size: 1.2rem;
    }

    /* Specifications Section */
    .specs-section {
      background: linear-gradient(135deg, rgba(27, 28, 51, 0.8), rgba(32, 34, 74, 0.5));
      padding: 25px;
      border-radius: 20px;
      margin-bottom: 30px;
      border: 1px solid rgba(0, 191, 255, 0.2);
    }

    .spec-item {
      padding: 15px 20px;
      border-bottom: 1px solid rgba(0, 191, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 15px;
      transition: all 0.3s ease;
    }

    .spec-item:hover {
      background: rgba(0, 191, 255, 0.05);
      transform: translateX(5px);
    }

    .spec-item:last-child {
      border-bottom: none;
    }

    .spec-icon {
      color: var(--primary-blue);
      font-size: 1.1rem;
      width: 20px;
    }

    .spec-key {
      font-weight: 600;
      color: var(--primary-blue);
      min-width: 150px;
    }

    .spec-value {
      color: var(--text-light);
    }

    /* Action Buttons */
    .action-section {
      margin-top: 40px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn-buy {
      background: linear-gradient(45deg, var(--primary-blue), var(--secondary-blue));
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: bold;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 25px rgba(0, 191, 255, 0.3);
    }

    .btn-buy:hover {
      background: linear-gradient(45deg, var(--secondary-blue), #004499);
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(0, 191, 255, 0.5);
      color: white;
    }

    .btn-wishlist {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-light);
      border: 2px solid rgba(255, 255, 255, 0.3);
      padding: 13px 30px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: bold;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .btn-wishlist:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: var(--primary-blue);
      color: var(--primary-blue);
      transform: translateY(-2px);
    }

    /* Loading State */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 400px;
      flex-direction: column;
      gap: 20px;
    }

    .spinner {
      border: 3px solid rgba(0, 191, 255, 0.3);
      border-top: 3px solid var(--primary-blue);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      color: var(--primary-blue);
      font-size: 1.2rem;
      font-weight: 500;
    }

    /* Error State */
    .error-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }

    .error-state i {
      font-size: 4rem;
      color: #ff4d4d;
      margin-bottom: 20px;
    }

    .error-state h3 {
      color: #ff4d4d;
      margin-bottom: 15px;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .product-details {
        padding-left: 0;
        margin-top: 30px;
      }
      
      .product-title {
        font-size: 1.8rem;
      }
      
      .discounted-price {
        font-size: 1.8rem;
      }
      
      .original-price {
        font-size: 1.2rem;
      }
      
      .action-section {
        flex-direction: column;
      }
      
      .btn-buy, .btn-wishlist {
        width: 100%;
        justify-content: center;
      }
      
      .spec-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 5px;
      }
      
      .spec-key {
        min-width: auto;
      }
    }

    @media (max-width: 576px) {
      .product-card {
        padding: 20px;
      }
      
      .page-title {
        font-size: 1.8rem;
      }
      
      .section-header {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <!-- Header Section -->
  <div class="header-section">
    <div class="container">
      <div class="breadcrumb-nav">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <i class="fas fa-chevron-right"></i>
        <a href="mobile.html"><i class="fas fa-mobile-alt"></i> Mobiles</a>
        <i class="fas fa-chevron-right"></i>
        <span>Product Details</span>
      </div>
      <h1 class="page-title">📱 Product Details</h1>
    </div>
  </div>

  <div class="container">
    <a href="mobile.html" class="btn-back">
      <i class="fas fa-arrow-left"></i> Back to Mobiles
    </a>
    
    <div id="product-details">
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Loading product details...</div>
      </div>
    </div>
  </div>

  <script>
  document.addEventListener("DOMContentLoaded", function () {
    const params = new URLSearchParams(window.location.search);
    const productId = params.get("id");
    const productDetailsContainer = document.getElementById("product-details");

    if (!productId) {
      productDetailsContainer.innerHTML = `
        <div class="error-state">
          <i class="fas fa-exclamation-triangle"></i>
          <h3>Invalid Product</h3>
          <p>No product ID specified. Please select a product from the mobile listings.</p>
          <a href="mobile.html" class="btn-buy mt-3">
            <i class="fas fa-arrow-left"></i> Back to Products
          </a>
        </div>
      `;
      return;
    }

    fetch("mobile.json")
      .then(response => {
        if (!response.ok) throw new Error('Failed to load product data');
        return response.json();
      })
      .then(data => {
        const product = data.find(p => p.product_id === productId);
        if (!product) {
          productDetailsContainer.innerHTML = `
            <div class="error-state">
              <i class="fas fa-search"></i>
              <h3>Product Not Found</h3>
              <p>The requested product could not be found in our database.</p>
              <a href="mobile.html" class="btn-buy mt-3">
                <i class="fas fa-arrow-left"></i> Back to Products
              </a>
            </div>
          `;
          return;
        }

        // Calculate discount percentage
        const originalPrice = parseInt(product.price.replace(/[^\d]/g, "")) || 0;
        const discountedPrice = parseInt(product.discounted_price.replace(/[^\d]/g, "")) || 0;
        const discountPercentage = originalPrice > 0 ? Math.round(((originalPrice - discountedPrice) / originalPrice) * 100) : 0;

        // Generate offers HTML
        let offersHTML = "";
        if (product.offers && Object.keys(product.offers).length > 0) {
          offersHTML = `
            <h2 class="section-header">
              <i class="fas fa-gift"></i> Special Offers
            </h2>
            <div class="offers-section">
          `;
          for (const key in product.offers) {
            offersHTML += `
              <div class="offer-item">
                <i class="fas fa-check-circle offer-icon"></i>
                <span>${product.offers[key]}</span>
              </div>
            `;
          }
          offersHTML += "</div>";
        }

        // Generate specifications HTML
        let specsHTML = "";
        if (product.specifications && Object.keys(product.specifications).length > 0) {
          specsHTML = `
            <h2 class="section-header">
              <i class="fas fa-cog"></i> Technical Specifications
            </h2>
            <div class="specs-section">
          `;
          for (const key in product.specifications) {
            specsHTML += `
              <div class="spec-item">
                <i class="fas fa-circle spec-icon"></i>
                <span class="spec-key">${key}</span>
                <span class="spec-value">${product.specifications[key]}</span>
              </div>
            `;
          }
          specsHTML += "</div>";
        }

        // Generate rating stars
        const rating = parseFloat(product.rating) || 0;
        const fullStars = Math.floor(rating);
        const hasHalfStar = rating % 1 !== 0;
        const emptyStars = 5 - fullStars - (hasHalfStar ? 1 : 0);
        
        let starsHTML = "";
        for (let i = 0; i < fullStars; i++) {
          starsHTML += '<i class="fas fa-star"></i>';
        }
        if (hasHalfStar) {
          starsHTML += '<i class="fas fa-star-half-alt"></i>';
        }
        for (let i = 0; i < emptyStars; i++) {
          starsHTML += '<i class="far fa-star"></i>';
        }

        productDetailsContainer.innerHTML = `
          <div class="product-card">
            <div class="row g-4 align-items-center">
              <!-- Product Image -->
              <div class="col-lg-5">
                <div class="product-image-section">
                  <img src="${product.image_url}" alt="${product.title}" class="product-image" onerror="this.src='https://via.placeholder.com/400x400?text=No+Image'">
                </div>
              </div>

              <!-- Product Details -->
              <div class="col-lg-7">
                <div class="product-details">
                  <h1 class="product-title">${product.title}</h1>
                  
                  <div class="product-brand">
                    <i class="fas fa-tag"></i>
                    <span><strong>Brand:</strong> ${product.brand}</span>
                  </div>

                  <div class="pricing-section">
                    <div class="d-flex align-items-center flex-wrap gap-3">
                      <span class="discounted-price">${product.discounted_price}</span>
                      <span class="original-price">${product.price}</span>
                      ${discountPercentage > 0 ? `<span class="discount-badge">${discountPercentage}% OFF</span>` : ''}
                    </div>
                  </div>

                  <div class="rating-section">
                    <div class="rating-stars">
                      ${starsHTML}
                    </div>
                    <span class="rating-value">${product.rating}</span>
                    <span class="rating-label">out of 5</span>
                  </div>

                  <div class="action-section">
                    <a href="${product.product_link}" target="_blank" class="btn-buy">
                      <i class="fas fa-shopping-cart"></i>
                      Buy Now
                    </a>
                    <button class="btn-wishlist" onclick="addToWishlist('${productId}')">
                      <i class="fas fa-heart"></i>
                      Add to Wishlist
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Additional Information -->
            <div class="row mt-5">
              <div class="col-12">
                ${offersHTML}
                ${specsHTML}
              </div>
            </div>
          </div>
        `;
      })
      .catch(err => {
        console.error("Error loading product data:", err);
        productDetailsContainer.innerHTML = `
          <div class="error-state">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Failed to Load Product</h3>
            <p>There was an error loading the product details. Please try again later.</p>
            <a href="mobile.html" class="btn-buy mt-3">
              <i class="fas fa-arrow-left"></i> Back to Products
            </a>
          </div>
        `;
      });
  });

  // Wishlist functionality (placeholder)
  function addToWishlist(productId) {
    // Here you would typically save to localStorage or send to server
    alert(`Product added to wishlist! (Product ID: ${productId})`);
    
    // Visual feedback
    const btn = event.target;
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check"></i> Added to Wishlist';
    btn.style.background = 'var(--success-green)';
    btn.style.color = 'white';
    
    setTimeout(() => {
      btn.innerHTML = originalText;
      btn.style.background = '';
      btn.style.color = '';
    }, 2000);
  }
  </script>
</body>
</html>
