<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Vishal Sales</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0b0c1e 0%, #1a1d3a 50%, #0d1126 100%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background elements */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(0, 191, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(0, 102, 204, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(0, 191, 255, 0.05) 0%, transparent 50%);
      animation: float 20s ease-in-out infinite;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300bfff' fill-opacity='0.02'%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      animation: float 25s ease-in-out infinite reverse;
      pointer-events: none;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(180deg); }
    }

    .form-container {
      max-width: 420px;
      width: 100%;
      background: rgba(27, 28, 51, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 191, 255, 0.2);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 
        0 8px 32px rgba(0, 191, 255, 0.3),
        0 0 60px rgba(0, 102, 204, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      position: relative;
      transition: all 0.3s ease;
    }

    .form-container:hover {
      transform: translateY(-5px);
      box-shadow: 
        0 12px 40px rgba(0, 191, 255, 0.4),
        0 0 80px rgba(0, 102, 204, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .header-section {
      text-align: center;
      margin-bottom: 35px;
    }

    .logo-container {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #00bfff 0%, #0066cc 100%);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 8px 20px rgba(0, 191, 255, 0.4);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .logo-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: all 0.8s;
    }

    .logo-container:hover::before {
      left: 100%;
    }

    .logo-container:hover {
      transform: scale(1.1) rotate(5deg);
      box-shadow: 0 12px 30px rgba(0, 191, 255, 0.6);
    }

    .logo-container i {
      font-size: 32px;
      color: white;
      z-index: 1;
    }

    .form-container h2 {
      font-size: 28px;
      font-weight: 700;
      color: #00bfff;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      font-weight: 400;
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.3px;
    }

    .input-wrapper {
      position: relative;
    }

    .form-control {
      width: 100%;
      padding: 14px 16px 14px 50px;
      background: rgba(15, 16, 35, 0.8);
      border: 2px solid rgba(0, 191, 255, 0.2);
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    .form-control:focus {
      outline: none;
      border-color: #00bfff;
      background: rgba(15, 16, 35, 0.95);
      box-shadow: 0 0 20px rgba(0, 191, 255, 0.3);
      transform: translateY(-1px);
    }

    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(0, 191, 255, 0.6);
      font-size: 16px;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .form-control:focus + .input-icon {
      color: #00bfff;
      transform: translateY(-50%) scale(1.1);
    }

    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .password-toggle:hover {
      color: #00bfff;
      transform: translateY(-50%) scale(1.1);
    }

    .forgot-password {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 24px;
    }

    .forgot-password a {
      color: rgba(0, 191, 255, 0.8);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .forgot-password a:hover {
      color: #00bfff;
      text-shadow: 0 0 8px rgba(0, 191, 255, 0.5);
    }

    .btn-custom {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #00bfff 0%, #0066cc 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .btn-custom::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: all 0.6s;
    }

    .btn-custom:hover::before {
      left: 100%;
    }

    .btn-custom:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 25px rgba(0, 191, 255, 0.6);
    }

    .btn-custom:active {
      transform: translateY(0) scale(0.98);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 25px 0;
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 191, 255, 0.2), transparent);
    }

    .divider span {
      padding: 0 16px;
      font-weight: 500;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin: 20px 0;
    }

    .feature-item {
      text-align: center;
      padding: 12px 8px;
      border-radius: 8px;
      background: rgba(0, 191, 255, 0.05);
      border: 1px solid rgba(0, 191, 255, 0.1);
      transition: all 0.3s ease;
    }

    .feature-item:hover {
      background: rgba(0, 191, 255, 0.1);
      transform: translateY(-2px);
    }

    .feature-item i {
      font-size: 18px;
      color: #00bfff;
      margin-bottom: 6px;
      display: block;
    }

    .feature-item span {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 500;
    }

    .register-link {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid rgba(0, 191, 255, 0.1);
    }

    .register-link p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      margin: 0;
    }

    .register-link a {
      color: #00bfff;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .register-link a:hover {
      color: #66d9ff;
      text-shadow: 0 0 8px rgba(0, 191, 255, 0.5);
    }

    /* Loading animation */
    .loading {
      position: relative;
    }

    .loading .btn-text {
      opacity: 0;
    }

    .loading::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      margin: auto;
      border: 2px solid transparent;
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s ease infinite;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Remember me checkbox */
    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: -8px 0 20px 0;
    }

    .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #00bfff;
      cursor: pointer;
    }

    .remember-me label {
      color: rgba(255, 255, 255, 0.8);
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      margin: 0;
    }

    /* Responsive design */
    @media (max-width: 768px) {
      .form-container {
        margin: 20px;
        padding: 30px 25px;
      }
      
      .features-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      
      .logo-container {
        width: 60px;
        height: 60px;
      }
      
      .logo-container i {
        font-size: 26px;
      }
      
      .form-container h2 {
        font-size: 24px;
      }
    }

    /* Success state */
    .success-state {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    }

    .success-animation {
      animation: successPulse 0.6s ease-out;
    }

    @keyframes successPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="form-container">
    <div class="header-section">
      <div class="logo-container">
        <i class="fas fa-sign-in-alt"></i>
      </div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to your Vishal Sales account</p>
    </div>

    <form id="loginForm" action="/login" method="POST">
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <div class="input-wrapper">
          <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your email">
          <i class="fas fa-envelope input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <div class="input-wrapper">
          <input type="password" class="form-control" id="password" name="password" required placeholder="Enter your password">
          <i class="fas fa-lock input-icon"></i>
          <button type="button" class="password-toggle" onclick="togglePassword()">
            <i class="fas fa-eye" id="toggleIcon"></i>
          </button>
        </div>
      </div>

      <div class="forgot-password">
        <a href="#" onclick="showForgotPassword()">Forgot Password?</a>
      </div>

      <div class="remember-me">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Remember me for 30 days</label>
      </div>

      <button type="submit" class="btn btn-custom" id="submitBtn">
        <span class="btn-text">Sign In</span>
      </button>
    </form>

    <div class="divider">
      <span>Why choose us?</span>
    </div>

    <div class="features-grid">
      <div class="feature-item">
        <i class="fas fa-shield-alt"></i>
        <span>Secure Login</span>
      </div>
      <div class="feature-item">
        <i class="fas fa-chart-line"></i>
        <span>Sales Analytics</span>
      </div>
      <div class="feature-item">
        
        <i class="fas fa-headset"></i>
        <span>24/7 Support</span>
      </div>
    </div>

    <div class="register-link">
      <p>Don't have an account? <a href="register.html">Create one now</a></p>
    </div>
  </div>

  <script>
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('toggleIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      }
    }

    function showForgotPassword() {
      alert('Forgot password functionality would redirect to password reset page.');
    }

    // Form submission with loading state
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault(); // Remove in production
      
      const submitBtn = document.getElementById('submitBtn');
      const btnText = submitBtn.querySelector('.btn-text');
      
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;
      
      // Simulate API call (remove this in production)
      setTimeout(() => {
        submitBtn.classList.remove('loading');
        submitBtn.classList.add('success-state', 'success-animation');
        btnText.textContent = 'Welcome Back!';
        btnText.style.opacity = '1';
        
        // Simulate redirect after success
        setTimeout(() => {
          alert('Login successful! Redirecting to dashboard...');
          // window.location.href = '/dashboard';
          
          // Reset for demo
          submitBtn.classList.remove('success-state', 'success-animation');
          btnText.textContent = 'Sign In';
          submitBtn.disabled = false;
        }, 1500);
      }, 2000);
    });

    // Enhanced form interactions
    document.querySelectorAll('.form-control').forEach(input => {
      input.addEventListener('focus', function() {
        this.closest('.input-wrapper').style.transform = 'translateY(-1px)';
      });
      
      input.addEventListener('blur', function() {
        this.closest('.input-wrapper').style.transform = 'translateY(0)';
      });
      
      input.addEventListener('input', function() {
        if (this.value.length > 0) {
          this.style.borderColor = '#00bfff';
        } else {
          this.style.borderColor = 'rgba(0, 191, 255, 0.2)';
        }
      });
    });

    // Subtle mouse tracking effect
    document.addEventListener('mousemove', function(e) {
      const container = document.querySelector('.form-container');
      const rect = container.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      
      const rotateX = (y - centerY) / 30;
      const rotateY = (centerX - x) / 30;
      
      container.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    document.addEventListener('mouseleave', function() {
      const container = document.querySelector('.form-container');
      container.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
    });

    // Auto-fill demo (remove in production)
    setTimeout(() => {
      document.getElementById('email').value = 'user@vishalsales.com';
      document.getElementById('password').value = 'password123';
    }, 1000);
  </script>
</body>
</html>
